name: Publish conan packages

on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        type: string
        description: Version number (eg 0.20.1)
      upload_deps:
        required: true
        type: boolean
        default: false
        description: If true, publish slow-building deps as well
      lockfile_release_update:
        required: true
        type: boolean
        default: false
        description: If true, add a conan.lock artifact to the draft release


