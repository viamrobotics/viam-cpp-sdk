name: Publish conan packages

on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        type: string
        description: Version number (eg 0.20.1)
      upload_deps:
        required: true
        type: boolean
        default: false
        description: If true, publish slow-building deps as well
      lockfile_release_update:
        required: true
        type: boolean
        default: false
        description: If true, add a conan.lock artifact to the draft release


jobs:
  build_macos:
    # Not sure if we actually need x64 macos-latest
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: releases/v${{ inputs.ref }}


      - name: Install dependencies
        run: |
          cmake --version
          python --version
          ninja --version
          brew install buf
          python -m pip install conan

      - name: Set up python/conan
        env:
          CONAN_REMOTE_URL: ${{ secrets.conanRemote }}
          CONAN_LOGIN_USERNAME_VIAMCONAN: ${{ secrets.conanUsername}}
          CONAN_PASSWORD_VIAMCONAN: ${{ secrets.conanPassword }}
        run: |
          conan profile detect
          conan remote add viamconan $CONAN_REMOTE_URL
          conan remote auth --force -cc core:non_interactive=True viamconan

      - name: Set lockfile update arguments
        if: inputs.lockfile_release_update
        run: echo "LOCKFILE_UPDATE_ARGS=--lockfile-out conan.lock --lockfile-clean" >> $GITHUB_ENV

      - name: Create and upload package
        run: |
          # `buf` tries to read a CLI config file that we don't actually use located at
          # ~/.config/buf/config.yaml. We don't always have permission to access this
          # directory in CI, so we set the `BUF_CONFIG_DIR` to some other value that we
          # do have permissions for. See https://github.com/bufbuild/buf/issues/2698 for
          # more details.
          export BUF_CONFIG_DIR=$(mktemp -d)

          conan lock add --requires=viam-cpp-sdk/${{ inputs.ref }}

          conan create . --build=missing -s:a compiler.cppstd=17 \
          --lockfile etc/conan/conan.lock $LOCKFILE_UPDATE_ARGS

          conan upload "viam-cpp-sdk/*" -r viamconan -c

      - name: Upload lockfile artifact
        if: inputs.lockfile_release_update
        uses: actions/upload-artifact@v4
        with:
          name: conan-lockfile-macos-latest
          path: conan.lock

      - name: Upload additional deps
        if: inputs.upload_deps
        run: |
          conan upload "boost/*" -r viamconan -c
          conan upload "grpc/*" -r viamconan -c
          conan upload "protobuf/*" -r viamconan -c
          conan upload "opentelemetry-cpp/*" -r viamconan -c


  build_linux:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-large, github-linux-arm64-8core]
        image:
          - ghcr.io/viamrobotics/cpp-sdk-conan-ubuntu:jammy
          - ghcr.io/viamrobotics/cpp-sdk-conan-debian:bookworm
          - ghcr.io/viamrobotics/cpp-sdk-conan-debian:bullseye
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}
    # The conan toolchain image supplies conan (venv on PATH via profile.d), cmake,
    # and the compilers, so every conan step runs under a login shell to source
    # /etc/profile.d/conan-venv.sh; -eo pipefail re-adds what the login string drops.
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: releases/v${{ inputs.ref }}

    - name: Show platform info
      run: |
        uname -a
        cat /etc/os-release

    - name: Authenticate viam conan remote
      env:
        CONAN_REMOTE_URL: ${{ secrets.conanRemote }}
        CONAN_LOGIN_USERNAME_VIAMCONAN: ${{ secrets.conanUsername}}
        CONAN_PASSWORD_VIAMCONAN: ${{ secrets.conanPassword }}
      run: |
        conan remote add viamconan "$CONAN_REMOTE_URL"
        conan remote auth --force -cc core:non_interactive=True viamconan

    - name: Pre-install b2 (bullseye)
      if: matrix.image == 'ghcr.io/viamrobotics/cpp-sdk-conan-debian:bullseye'
      run: |
        conan install -r conancenter --update \
        --tool-requires=b2/5.4.2 --build=b2/5.4.2 -s compiler.cppstd=17 -s:a compiler.cppstd=17

    - name: Set lockfile update arguments
      if: inputs.lockfile_release_update
      run: echo "LOCKFILE_UPDATE_ARGS=--lockfile-out conan.lock --lockfile-clean" >> $GITHUB_ENV

    - name: Create and upload package
      run: |
        conan lock add --requires=viam-cpp-sdk/${{ inputs.ref }}

        # Pin Release; the image profile defaults to RelWithDebInfo, but releases stay Release.
        conan create . --build=missing -s:a compiler.cppstd=17 -s:a build_type=Release \
        --lockfile etc/conan/conan.lock $LOCKFILE_UPDATE_ARGS

        conan upload "viam-cpp-sdk/*" -r viamconan -c

    - name: Sanitize image name for artifact
      if: inputs.lockfile_release_update
      env:
        IMAGE_NAME: "${{ matrix.image }}"
      run: |
        IMAGE_NAME=${{ env.IMAGE_NAME }}
        IMAGE_NAME=${IMAGE_NAME//[:\/]/-} # replace colons and slashes with hyphens
        echo IMAGE_NAME=${IMAGE_NAME} >> $GITHUB_ENV

    - name: Upload lockfile artifact
      if: inputs.lockfile_release_update
      uses: actions/upload-artifact@v4
      with:
        name: conan-lockfile-${{ matrix.runner }}-${{ env.IMAGE_NAME }}
        path: conan.lock

    - name: Upload additional deps
      run: |
        conan upload "boost/*" -r viamconan -c
        conan upload "abseil/*" -r viamconan -c
        conan upload "grpc/*" -r viamconan -c
        conan upload "protobuf/*" -r viamconan -c
        conan upload "opentelemetry-cpp/*" -r viamconan -c
        conan upload "c-ares/*" -r viamconan -c
        conan upload "libbacktrace/*" -r viamconan -c
        conan upload "re2/*" -r viamconan -c

  build_windows:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: releases/v${{ inputs.ref }}

    - name: Install dependencies
      run: choco install -y conan git

    - name: Set up python/conan
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        Import-Module $env:ChocolateyInstall\helpers\chocolateyProfile.psm1
        refreshenv

        conan profile detect

        conan remote add viamconan $env:CONAN_REMOTE_URL
        conan remote auth --force -cc core:non_interactive=True viamconan
      env:
        CONAN_REMOTE_URL: ${{ secrets.conanRemote }}
        CONAN_LOGIN_USERNAME_VIAMCONAN: ${{ secrets.conanUsername}}
        CONAN_PASSWORD_VIAMCONAN: ${{ secrets.conanPassword }}
        CONAN_USER_HOME: c:/cache
        CONAN_USER_HOME_SHORT: c:/cache/conan_shortpaths

    - name: Create and upload package
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        Import-Module $env:ChocolateyInstall\helpers\chocolateyProfile.psm1
        refreshenv

        conan create . --build=missing -s:a compiler.cppstd=17 --lockfile etc/conan/conan.lock --lockfile-partial
        conan upload "viam-cpp-sdk/*" -r viamconan -c
      env:
        CONAN_USER_HOME: c:/cache
        CONAN_USER_HOME_SHORT: c:/cache/conan_shortpaths

    - name: Upload additional deps
      if: inputs.upload_deps
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        Import-Module $env:ChocolateyInstall\helpers\chocolateyProfile.psm1
        refreshenv

        conan upload "boost/*" -r viamconan -c
        conan upload "grpc/*" -r viamconan -c
        conan upload "protobuf/*" -r viamconan -c
        conan upload "opentelemetry-cpp/*" -r viamconan -c
      env:
        CONAN_USER_HOME: c:/cache
        CONAN_USER_HOME_SHORT: c:/cache/conan_shortpaths

  merge_lockfiles:
    needs: [build_macos, build_linux]
    if: inputs.lockfile_release_update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: releases/v${{ inputs.ref }}
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: Download lockfile artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conan-lockfile-*
          path: lockfiles

      - name: Install Conan
        run: |
          python3 -m pip install conan

      - name: Merge lockfiles
        run: |
          cd lockfiles
          # List all downloaded lockfiles
          ls -R

          # Merge all lockfiles into a single merged lockfile
          LOCKFILE_ARGS=$(find . -name "conan.lock" -type f | sed 's|^|--lockfile |')
          conan lock merge $LOCKFILE_ARGS
          cat conan.lock

      - name: Upload merged lockfile to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: releases/v${{ inputs.ref }}
          files: lockfiles/conan.lock
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
