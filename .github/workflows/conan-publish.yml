  build_linux:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-large]
        image: [debian:bullseye]
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: releases/v${{ inputs.ref }}

    - name: Show platform info
      run: |
        uname -a
        cat /etc/os-release

    - name: Install common deps
      run: |
        apt-get update
        apt-get -y dist-upgrade
        DEBIAN_FRONTEND=noninteractive apt-get -y --no-install-recommends install \
            autoconf \
            automake \
            build-essential \
            ca-certificates \
            curl \
            doxygen \
            g++ \
            gdb \
            gnupg \
            gpg \
            less \
            ninja-build \
            python3 \
            python3-pip \
            python3-venv \
            software-properties-common \
            sudo \
            wget \

    - name: Install cmake (jammy)
      if: matrix.image == 'ubuntu:22.04'
      run: |
        sudo wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | sudo gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
        sudo echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

        apt-get update
        apt-get -y install cmake=3.25.2-0kitware1ubuntu22.04.1 cmake-data=3.25.2-0kitware1ubuntu22.04.1

    - name: Install cmake (bookworm)
      if: matrix.image == 'debian:bookworm'
      run: DEBIAN_FRONTEND=noninteractive apt-get -y --no-install-recommends install cmake

    - name: Install cmake (bullseye)
      if: matrix.image == 'debian:bullseye'
      run: |
        apt-get install -y software-properties-common
        apt-add-repository -y 'deb https://archive.debian.org/debian bullseye-backports main'
        apt-get update
        apt-get -y --no-install-recommends install -t bullseye-backports cmake

    - name: Install clang-19 (bullseye)
      if: matrix.image == 'debian:bullseye'
      run: |
        bash -c 'wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|apt-key add -'
        apt-add-repository -y 'deb http://apt.llvm.org/bullseye/ llvm-toolchain-bullseye-19 main'
        apt-add-repository -y 'deb https://archive.debian.org/debian bullseye-backports main'
        apt-get update
        apt-get -y install -t llvm-toolchain-bullseye-19 \
            clang-19 libc++-19-dev libc++abi-19-dev

    - name: Set up python/conan
      env:
        CONAN_REMOTE_URL: ${{ secrets.conanRemote }}
        CONAN_LOGIN_USERNAME_VIAMCONAN: ${{ secrets.conanUsername}}
        CONAN_PASSWORD_VIAMCONAN: ${{ secrets.conanPassword }}
      run: |
        python3 -m venv ./conan_venv
        . ./conan_venv/bin/activate

        pip install conan

        conan profile detect
        conan remote add viamconan $CONAN_REMOTE_URL
        conan remote auth --force -cc core:non_interactive=True viamconan

    - name: Set conan profile (bullseye)
      if: matrix.image == 'debian:bullseye'
      run: |
        cat > ~/.conan2/profiles/default << 'EOF'
        [settings]
        arch={{detect_api.detect_arch()}}
        build_type=Release
        compiler=clang
        compiler.cppstd=20
        compiler.libcxx=libstdc++11
        compiler.version=19
        os=Linux

        [conf]
        tools.build:compiler_executables={"c": "clang-19", "cpp": "clang++-19"}

        [options]
        boost/*:without_cobalt=True
        EOF

    # - name: Pre-install b2 (bullseye)
    #   if: matrix.image == 'debian:bullseye'
    #   run: |
    #     . ./conan_venv/bin/activate
    #     conan install -r conancenter --update \
    #     --tool-requires=b2/5.3.1 --build=b2/5.3.1 -s:a compiler.cppstd=17

    - name: Set lockfile update arguments
      if: inputs.lockfile_release_update
      run: echo "LOCKFILE_UPDATE_ARGS=--lockfile-out conan.lock --lockfile-clean" >> $GITHUB_ENV

    - name: Create and upload package
      run: |
        . ./conan_venv/bin/activate

        conan lock add --requires=viam-cpp-sdk/${{ inputs.ref }}

        conan create . --build=missing -s:a compiler.cppstd=20 -o:a "&:shared=False" \
        --lockfile etc/conan/conan.lock $LOCKFILE_UPDATE_ARGS

        conan upload "viam-cpp-sdk/*" -r viamconan -c

    - name: Sanitize image name for artifact
      if: inputs.lockfile_release_update
      shell: bash
      env:
        IMAGE_NAME: "${{ matrix.image }}"
      run: |
        IMAGE_NAME=${{ env.IMAGE_NAME }}
        IMAGE_NAME=${IMAGE_NAME//:/-} # replace colons with hyphens
        echo IMAGE_NAME=${IMAGE_NAME} >> $GITHUB_ENV

    - name: Upload lockfile artifact
      if: inputs.lockfile_release_update
      uses: actions/upload-artifact@v4
      with:
        name: conan-lockfile-${{ matrix.runner }}-${{ env.IMAGE_NAME }}
        path: conan.lock

    - name: Upload additional deps
      run: |
        . ./conan_venv/bin/activate

        conan upload "boost/*" -r viamconan -c
        conan upload "abseil/*" -r viamconan -c
        conan upload "grpc/*" -r viamconan -c
        conan upload "protobuf/*" -r viamconan -c
        conan upload "c-ares/*" -r viamconan -c
        conan upload "libbacktrace/*" -r viamconan -c
        conan upload "re2/*" -r viamconan -c

