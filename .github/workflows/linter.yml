name: cpp-linter

on:
  pull_request:
    paths:
      - '**.cpp'
      - '**.hpp'
  workflow_dispatch:

jobs:
  cpp-linter:
    if: github.repository_owner == 'viamrobotics'
    runs-on: ubuntu-latest
    container: ghcr.io/viamrobotics/cpp-base:bullseye-amd64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: verify no uncommitted changes
        run: |
          chown $(whoami) .
          git init
          git add .
          ./bin/run-clang-format.sh
          GEN_DIFF=$(git status -s)

          if [ -n "$GEN_DIFF" ]; then
              echo 'linting resulted in changes not in git' 1>&2
              git status
              git diff
              exit 1
          fi
      - name: verify private/api includes only in cpp or private headers
        run: |
          BAD_API=$(grep -lR --include='*.hpp' --exclude-dir='private' --exclude-dir='api' '#include <viam/api' src/viam) || true
          BAD_PRIVATE=$(grep -lR --include='*.hpp' --exclude-dir='private' --exclude-dir='api' '#include <viam/sdk/.*/private' src/viam) || true
          if [ -n "$BAD_API" ] || [ -n "$BAD_PRIVATE" ]; then
              echo 'public headers must not include <viam/api/...> or <viam/sdk/.../private/...>:' 1>&2
              [ -n "$BAD_API" ] && echo "$BAD_API" 1>&2
              [ -n "$BAD_PRIVATE" ] && echo "$BAD_PRIVATE" 1>&2
              exit 1
          fi
